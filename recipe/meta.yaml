{% set version = "0.13.0" %}
{% set python_min = "3.12" %}

package:
  name: lsst-rsp
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/lsst-rsp/lsst_rsp-{{ version }}.tar.gz
  sha256: 0de0e1a122fd59abbefceaf073fd04826142ced142ea9ba0769ffecb8aeae1e1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 2

requirements:
  host:
    - python ={{ python_min }}
    - setuptools >=61
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - deprecated
    - ipython
    - pyvo
    - httpx
    - xmltodict

test:
  imports:
    - lsst
  commands:
    - pip check
  requires:
    - pip
    - python ={{ python_min }}

about:
  summary: Utility functions for the Rubin Science Platform
  home: https://github.com/lsst-sqre/lsst-rsp
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - beckermr
    - athornton
